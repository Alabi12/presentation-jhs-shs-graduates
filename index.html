<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success Planner | Graduate Resilience & Goal Setting</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-spinner"></div>
        <p>Preparing your success journey...</p>
    </div>

    <!-- Mobile Navigation -->
    <div class="mobile-nav">
        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <i class="fas fa-bars"></i>
        </button>
        <h2 class="mobile-title">Success Planner</h2>
    </div>

    <div class="container">
        <!-- Sidebar (Hidden on mobile by default) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1><i class="fas fa-rocket"></i> Success Planner</h1>
                <button class="close-sidebar" id="closeSidebar">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="progress-section">
                <h3><i class="fas fa-chart-line"></i> Your Progress</h3>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p id="progressText">0% Complete</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-number" id="completedSections">0</div>
                        <div class="stat-label">Sections</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-tasks"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-number" id="completedActivities">0</div>
                        <div class="stat-label">Activities</div>
                    </div>
                </div>
            </div>

            <nav class="section-nav">
                <h3><i class="fas fa-compass"></i> Navigation</h3>
                <div class="nav-items">
                    <button class="nav-item active" data-section="1">
                        <i class="fas fa-bullseye"></i>
                        <span>The Hook</span>
                        <div class="nav-progress"></div>
                    </button>
                    <button class="nav-item" data-section="2">
                        <i class="fas fa-fist-raised"></i>
                        <span>Resilience</span>
                        <div class="nav-progress"></div>
                    </button>
                    <button class="nav-item" data-section="3">
                        <i class="fas fa-clock"></i>
                        <span>Discipline</span>
                        <div class="nav-progress"></div>
                    </button>
                    <button class="nav-item" data-section="4">
                        <i class="fas fa-tasks"></i>
                        <span>Goal Setting</span>
                        <div class="nav-progress"></div>
                    </button>
                    <button class="nav-item" data-section="5">
                        <i class="fas fa-calendar-alt"></i>
                        <span>Daily Routine</span>
                        <div class="nav-progress"></div>
                    </button>
                    <button class="nav-item" data-section="6">
                        <i class="fas fa-rocket"></i>
                        <span>Action Plan</span>
                        <div class="nav-progress"></div>
                    </button>
                </div>
            </nav>

            <div class="quick-actions">
                <h3><i class="fas fa-bolt"></i> Quick Actions</h3>
                <button class="quick-btn" onclick="app.readCurrentSection()">
                    <i class="fas fa-volume-up"></i> Read Section
                </button>
                <button class="quick-btn" onclick="app.saveProgress()">
                    <i class="fas fa-save"></i> Save Progress
                </button>
                <button class="quick-btn" onclick="app.exportData()">
                    <i class="fas fa-download"></i> Export Data
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <div class="breadcrumb">
                    <span id="currentSectionTitle">Your "And Then What?" Moment</span>
                </div>
                <div class="header-actions">
                    <button class="theme-toggle" id="themeToggle">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </header>

            <div class="content-scroll">
                <!-- Dynamic sections will be loaded here -->
                <div id="contentContainer"></div>

                <!-- Navigation Buttons -->
                <div class="nav-buttons">
                    <button id="prevBtn" class="btn btn-outline" onclick="app.navigate(-1)" disabled>
                        <i class="fas fa-arrow-left"></i> Previous
                    </button>
                    <div class="section-indicator">
                        <span id="currentSection">1</span> of <span id="totalSections">6</span>
                    </div>
                    <button id="nextBtn" class="btn btn-primary" onclick="app.navigate(1)">
                        Next <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </main>

        <!-- Toast Notifications -->
        <div id="toastContainer" class="toast-container"></div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
